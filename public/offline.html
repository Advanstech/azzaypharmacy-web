<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azzay Pharmacy — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: linear-gradient(135deg, #060B14 0%, #1A1F35 100%);
      color: #F8FAFC;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(15,23,42,0.8);
      border: 1px solid rgba(0,217,255,0.2);
      border-radius: 24px;
      padding: 48px;
      text-align: center;
      max-width: 420px;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 64px rgba(0,0,0,0.5);
    }
    .icon {
      width: 80px; height: 80px;
      background: rgba(0,217,255,0.1);
      border: 1px solid rgba(0,217,255,0.3);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p { color: #94A3B8; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.3);
      color: #F59E0B;
      padding: 8px 16px; border-radius: 999px;
      font-size: 12px; font-weight: 600;
      margin-bottom: 24px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #F59E0B;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    button {
      background: linear-gradient(135deg, #00D9FF, #00A3CC);
      color: #060B14;
      border: none; border-radius: 12px;
      padding: 12px 32px;
      font-size: 14px; font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(0,217,255,0.3);
      transition: transform 0.1s;
    }
    button:active { transform: scale(0.98); }
    .note {
      margin-top: 20px;
      font-size: 12px;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">💊</div>
    <div class="badge">
      <div class="dot"></div>
      Offline Mode
    </div>
    <h1>You're Offline</h1>
    <p>
      Azzay Pharmacy NEXUS is running in offline mode.
      Cached pages and POS data are still available.
      Transactions will sync automatically when you reconnect.
    </p>
    <button onclick="window.location.reload()">Try Again</button>
    <p class="note">
      Offline transactions are saved locally and will sync when connectivity is restored.
    </p>
  </div>
</body>
</html>
